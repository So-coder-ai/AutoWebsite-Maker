services:
  - type: web
    name: autowebsite-maker
    runtime: docker
    dockerContext: .
    dockerfilePath: ./Dockerfile
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGINS
        value: "*"
      - key: GENERATED_PAGES_DIR
        value: generated_pages
      - key: ENVIRONMENT
        value: production
      - key: REACT_APP_API_URL
        value: ""
      - key: PORT
        value: 8000
