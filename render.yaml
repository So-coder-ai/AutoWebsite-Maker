services:
  - type: web
    name: autowebsite-maker
    runtime: node
    buildCommand: |
      cd backend && pip install -r requirements.txt
      cd ../frontend && npm install && npm run build
    startCommand: |
      cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    staticPublishPath: ./frontend/build
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGINS
        value: "*"
      - key: GENERATED_PAGES_DIR
        value: generated_pages
      - key: ENVIRONMENT
        value: production
      - key: REACT_APP_API_URL
        value: ""
