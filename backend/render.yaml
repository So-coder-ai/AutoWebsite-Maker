services:
  - type: web
    name: autowebsite-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: GENERATED_PAGES_DIR
        value: generated_pages
      - key: ENVIRONMENT
        value: production
